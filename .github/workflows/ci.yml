name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs for the same PR/branch so a new push doesn't leave the
# whole matrix running on a stale commit. Pushes to main are never cancelled —
# their runs are the record for that commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3
      # The postgres conformance suite is gated behind a build tag, so plain
      # vet/lint never compiles it; keep it compiling.
      - name: Vet tag-gated postgres backend
        run: go vet -tags postgres ./storage/relationaldb/postgres/

  # Advisory linters (security smells, leaked HTTP bodies, missing request
  # contexts, slice preallocation). The codebase is currently clean against this
  # config, so the job is green. continue-on-error keeps it non-blocking: a new
  # finding shows up on the PR (and goes red here) without gating the merge, to
  # be fixed opportunistically.
  lint-advisory:
    name: Lint (advisory, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3
          args: --config .golangci-warnings.yml

  generate:
    name: Generate (ledgerfields drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          cgo: "false"
      # Re-run the ledgerfields generator and fail if any *_gen.go file
      # changes — a spec edit without `go generate` would otherwise silently
      # ship a stale typed decoder.
      - name: Re-run go generate
        run: go generate ./internal/tx/ledgerfields/...
      - name: Fail on tree diff
        run: |
          if ! git diff --exit-code -- internal/tx/ledgerfields; then
            echo "::error::ledgerfields generated files are out of date."
            echo "Run: go generate ./internal/tx/ledgerfields/..."
            echo "Then commit the regenerated *_gen.go files."
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: go build -v ./cmd/xrpld

  # 32-bit word-size guard. go-xrpl's correctness is "produce the same bytes as
  # rippled"; an `int`-width or endianness assumption in the codec / hashing
  # paths silently forks account_hash / transaction_hash. `int` is 64-bit on the
  # amd64 matrix, so an overflow like `len(x) > math.MaxUint32` only fails to
  # compile on a 32-bit target. This compiles the whole module for linux/386
  # (CGO off → peertls uses its !cgo stub) and is fast. Runtime 386 tests run in
  # the nightly workflow.
  build-386:
    name: Build (linux/386 — word-size guard)
    runs-on: ubuntu-latest
    env:
      GOOS: linux
      GOARCH: "386"
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          cgo: "false"
      - run: go build ./...

  test:
    name: Test (${{ matrix.group }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The offer package (crossing-limits tests) submits tens of thousands
          # of offers across many ledger closes — by far the heaviest suite.
          # Give it a dedicated shard so it runs in parallel with the rest, and
          # run it without -race: these are deterministic protocol-logic tests
          # that the detector slowed ~9x (900s -> ~96s) while the engine's
          # concurrency is already exercised under -race by the other shards.
          # (The nightly workflow runs this suite *with* -race, off the hot path.)
          - group: integration-offer
            packages: ./internal/testing/offer/...
            race: ""
          - group: integration
            packages: "$(go list ./internal/testing/... | grep -v '/internal/testing/offer$')"
            race: "-race"
          - group: tx
            packages: ./internal/tx/...
            race: "-race"
          - group: core
            packages: ./internal/ledger/... ./internal/txq/... ./internal/rpc/... ./internal/consensus/... ./internal/peermanagement/...
            race: "-race"
          - group: libs
            packages: ./codec/... ./crypto/... ./shamap/... ./storage/... ./keylet/... ./ledger/... ./amendment/... ./drops/... ./protocol/... ./config/...
            race: "-race"
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: go test ${{ matrix.race }} -count=1 -timeout 15m ${{ matrix.packages }}

  test-purego:
    name: Test (libs, CGO_ENABLED=0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          cgo: "false"
      # Exercises the pure-Go crypto backends that ship in CGO-disabled
      # builds — most importantly secp256k1's decred verify path, which the
      # CGO=1 legs never compile. Asserts it agrees with the libsecp256k1
      # path on signature accept/reject. No -race here: the detector needs
      # cgo, and no CGO dev headers are installed for this leg.
      - run: CGO_ENABLED=0 go test -count=1 -timeout 15m ./crypto/...

  consensus-smoke:
    name: Consensus smoke (2 rippled + 1 goxrpl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build goxrpl docker image
        run: docker build -t goxrpl:latest .

      - name: Run consensus smoke
        run: bash scripts/consensus-smoke/smoke.sh
        env:
          GOXRPL_IMAGE: goxrpl:latest
          RIPPLED_IMAGE: rippleci/rippled:2.6.2
          PAYMENT_COUNT: "3"
          MIN_SEQ_EMPTY: "15"
          BOOT_TIMEOUT: "240"
          TX_TIMEOUT: "180"

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f scripts/consensus-smoke/docker-compose.yml logs --no-color --tail=200 || true
