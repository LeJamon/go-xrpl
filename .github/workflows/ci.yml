name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install CGO dev headers (OpenSSL, libsecp256k1)
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libsecp256k1-dev pkg-config
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3

  generate:
    name: Generate (ledgerfields drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      # Re-run the ledgerfields generator and fail if any *_gen.go file
      # changes — a spec edit without `go generate` would otherwise silently
      # ship a stale typed decoder.
      - name: Re-run go generate
        run: go generate ./internal/tx/ledgerfields/...
      - name: Fail on tree diff
        run: |
          if ! git diff --exit-code -- internal/tx/ledgerfields; then
            echo "::error::ledgerfields generated files are out of date."
            echo "Run: go generate ./internal/tx/ledgerfields/..."
            echo "Then commit the regenerated *_gen.go files."
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install CGO dev headers (OpenSSL, libsecp256k1)
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libsecp256k1-dev pkg-config
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      - run: go build -v ./cmd/xrpld

  test:
    name: Test (${{ matrix.group }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The offer package (crossing-limits tests) submits tens of thousands
          # of offers across many ledger closes — by far the heaviest suite.
          # Give it a dedicated shard so it runs in parallel with the rest, and
          # run it without -race: these are deterministic protocol-logic tests
          # that the detector slowed ~9x (900s -> ~96s) while the engine's
          # concurrency is already exercised under -race by the other shards.
          - group: integration-offer
            packages: ./internal/testing/offer/...
            race: ""
          - group: integration
            packages: "$(go list ./internal/testing/... | grep -v '/internal/testing/offer$')"
            race: "-race"
          - group: tx
            packages: ./internal/tx/...
            race: "-race"
          - group: core
            packages: ./internal/ledger/... ./internal/txq/... ./internal/rpc/... ./internal/consensus/... ./internal/peermanagement/...
            race: "-race"
          - group: libs
            packages: ./codec/... ./crypto/... ./shamap/... ./storage/... ./keylet/... ./ledger/... ./amendment/... ./drops/... ./protocol/... ./config/...
            race: "-race"
    steps:
      - uses: actions/checkout@v5
      - name: Install CGO dev headers (OpenSSL, libsecp256k1)
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libsecp256k1-dev pkg-config
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      - run: go test ${{ matrix.race }} -count=1 -timeout 15m ${{ matrix.packages }}

  test-purego:
    name: Test (libs, CGO_ENABLED=0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      # Exercises the pure-Go crypto backends that ship in CGO-disabled
      # builds — most importantly secp256k1's decred verify path, which the
      # CGO=1 legs never compile. Asserts it agrees with the libsecp256k1
      # path on signature accept/reject. No -race here: the detector needs
      # cgo, and no CGO dev headers are installed for this leg.
      - run: CGO_ENABLED=0 go test -count=1 -timeout 15m ./crypto/...

  wasm:
    name: WASM engine (wasmi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build deps (cmake, conan)
        run: |
          sudo apt-get update && sudo apt-get install -y cmake python3-pip
          pipx install conan || pip install --user conan
          conan profile detect --force
          conan remote add xrplf https://conan.ripplex.io || true
      # Conan may build wasmi from source via Rust if no matching binary exists.
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      # libwasmi is the exact wasmi/1.0.9 package rippled uses (XRPLF conan
      # remote); cache it on build.sh (which pins the version) so it resolves once.
      - name: Cache libwasmi
        uses: actions/cache@v4
        with:
          path: internal/wasm/wasmi/artifacts
          key: libwasmi-${{ runner.os }}-${{ hashFiles('internal/wasm/wasmi/build.sh') }}
      - name: Build libwasmi
        run: ./internal/wasm/wasmi/build.sh
      # The WASM engine is gated behind the `wasmi` tag; assert its gas costs
      # match rippled's smart-escrow branch (fib=1137) byte-for-byte.
      - run: go test -tags wasmi -count=1 -timeout 15m ./internal/wasm/...

  consensus-smoke:
    name: Consensus smoke (2 rippled + 1 goxrpl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build goxrpl docker image
        run: docker build -t goxrpl:latest .

      - name: Run consensus smoke
        run: bash scripts/consensus-smoke/smoke.sh
        env:
          GOXRPL_IMAGE: goxrpl:latest
          RIPPLED_IMAGE: rippleci/rippled:2.6.2
          PAYMENT_COUNT: "3"
          MIN_SEQ_EMPTY: "15"
          BOOT_TIMEOUT: "240"
          TX_TIMEOUT: "180"

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f scripts/consensus-smoke/docker-compose.yml logs --no-color --tail=200 || true
