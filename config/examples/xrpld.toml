# go-xrpl configuration file
# ALL fields listed here are REQUIRED unless marked as optional.
# The server will refuse to start if any required field is missing.
# Use 'xrpld generate-config' to create this file automatically.

# =============================================================================
# Top-level settings (MUST come before any [section] headers in TOML)
# =============================================================================

# Peer Protocol
compression = false
peer_private = 0         # 0 = normal, 1 = private
peers_max = 21           # maximum peer connections
max_transactions = 250   # job queue max (100-1000)

# Peer discovery IPs (optional — empty list is valid)
ips = [
    "r.ripple.com 51235",
    "sahyadri.isrdc.in 51235",
    "hubs.xrpkuwait.com 51235",
    "hub.xrpl-commons.org 51235"
]

# Fixed peer connections (optional)
# ips_fixed = ["192.168.1.100 51235"]

# Ripple Protocol (optional — defaults: trusted / all / 256 / "full")
relay_proposals = "trusted"      # all, trusted, drop_untrusted (case-insensitive)
relay_validations = "all"        # all, trusted, drop_untrusted (case-insensitive)
ledger_history = 256             # integer, "full", or "none"
fetch_depth = "full"             # integer, "full", or "none" (values < 10 are clamped to 10)

# Network: "main", "testnet", "devnet", or integer
network_id = "main"

ledger_replay = 0    # 0 = disabled, 1 = enabled

# Database path (SQLite location)
database_path = "/var/lib/xrpld/db"

# Diagnostics
debug_logfile = "/var/log/xrpld/debug.log"

# Node sizing: tiny, small, medium, large, huge (optional — default medium)
node_size = "medium"

beta_rpc_api = 0

# Operator domain emitted in the peer handshake (optional)
# server_domain = "example.com"

# WebSocket keepalive ping cadence in seconds (optional — default 30)
# websocket_ping_frequency = 30

# Validators file (optional — path to validators.toml or validators.txt)
# validators_file = "validators.toml"

# Genesis file (optional — omit to use built-in defaults)
# genesis_file = "genesis.json"

# Validation settings (optional — only for validator nodes)
# validation_seed = "RASH BUSH MILK LOOK BAD BRIM AVID GAFF BAIT ROT POD LOVE"
# validator_token = "base64-encoded-token"

# =============================================================================
# Server Configuration
# =============================================================================

[server]
# List of port names — each MUST have a corresponding [port_*] section below.
ports = ["port_rpc_admin_local", "port_rpc_public", "port_peer", "port_ws_admin_local", "port_ws_public"]

# =============================================================================
# Port Configurations
# Required per port: port, ip, protocol
#
# Admin vs public:
#   - admin = ["127.0.0.1"]  → only listed IPs get admin role (CIDR supported)
#   - no admin field          → public port, all clients get guest role
#
# Optional fields:
#   - limit             → max concurrent connections (0 = unlimited)
#   - send_queue_limit  → WS send buffer per connection (default 100)
# =============================================================================

# --- Admin ports (localhost only) ---

[port_rpc_admin_local]
port = 5005
ip = "127.0.0.1"
admin = ["127.0.0.1"]
protocol = "http"

[port_ws_admin_local]
port = 6006
ip = "127.0.0.1"
admin = ["127.0.0.1"]
protocol = "ws"
send_queue_limit = 500

# --- Public ports (open to all interfaces, no admin access) ---

[port_rpc_public]
port = 5555
ip = "0.0.0.0"
protocol = "http"
limit = 500

[port_ws_public]
port = 6005
ip = "0.0.0.0"
protocol = "ws"
limit = 300
send_queue_limit = 100

# --- Peer port ---

[port_peer]
port = 51235
ip = "0.0.0.0"
protocol = "peer"

# Uncomment to enable gRPC port for Clio integration
# [port_grpc]
# port = 50051
# ip = "127.0.0.1"
# protocol = "grpc"
# secure_gateway = ["127.0.0.1"]

# =============================================================================
# Database
# =============================================================================

[node_db]
type = "pebble"
path = "/var/lib/xrpld/db/pebble"
online_delete = 512
advisory_delete = 0
cache_size = 16384               # node-object cache entries (0 = default 10000)
cache_age = 5                    # node-object cache age in minutes (0 = default 10)
fast_load = false
earliest_seq = 32570
delete_batch = 100
back_off_milliseconds = 100
age_threshold_seconds = 60
recovery_wait_seconds = 5

[sqlite]
journal_mode = "wal"             # delete, truncate, persist, memory, wal, off
synchronous = "normal"           # off, normal, full, extra
temp_store = "file"              # default, file, memory
page_size = 4096                 # power of 2, 512-65536
journal_size_limit = 1582080

# =============================================================================
# Overlay & Transaction Queue (optional tuning — values shown are the
# built-in defaults; omit either section to use them)
# =============================================================================

[overlay]
max_unknown_time = 600   # seconds (300-1800)
max_diverged_time = 300  # seconds (60-900)
# public_ip = "203.0.113.7"

[transaction_queue]
ledgers_in_queue = 20
minimum_queue_size = 2000
retry_sequence_percent = 25
minimum_escalation_multiplier = 128000
minimum_txn_in_ledger = 32
minimum_txn_in_ledger_standalone = 1000
target_txn_in_ledger = 256
maximum_txn_in_ledger = 0  # 0 = no maximum
normal_consensus_increase_percent = 20
slow_consensus_decrease_percent = 50
maximum_txn_per_account = 10
minimum_last_ledger_buffer = 2

# =============================================================================
# Optional Sections
# =============================================================================

# On-disk validation archive (optional). When enabled, validations
# pruned from ValidationTracker are persisted to a `validations` table
# in the relational DB so forensic tooling can query historical
# validations. Omit the section to disable; uncomment + adjust to tune.
#
# Note: SQLite is the default backend, sharing ledger.db with single-
# writer concurrency. Sustained ledger-write pressure can therefore
# back up the archive's writer goroutine; under sustained overload
# OnStale logs a warning and drops, rather than blocking consensus.
# [validation_archive]
# enabled            = true   # default false; set true to turn on
# retention_ledgers  = 10000  # 0 = keep forever
# batch_size         = 128    # rows per commit
# flush_interval_ms  = 1000   # max latency for partial batches
# delete_batch       = 1000   # max rows per retention sweep
# in_memory_ledgers  = 256    # tracker eviction window (rippled minimum)

# Stall watchdog (optional). An out-of-band goroutine that detects a wedged
# event loop (consensus timer or ledger close) and escalates: warn + goroutine
# dump, fatal log, then process abort so an orchestrator can restart the node.
# Enabled by default with rippled's 10/90/600s thresholds.
# [watchdog]
# disabled = false       # set true to turn the watchdog off entirely
# warn_seconds  = 10     # log a warning once a loop is silent this long
# fatal_seconds = 90     # escalate the periodic report to fatal
# abort_seconds = 600    # abort the process (warn < fatal < abort required)

# Operator amendment voting preferences (optional). Names match the amendment
# registry. `upvote` actively votes FOR an amendment (rippled's [amendments]
# stanza); `veto` refuses to vote for it (rippled's [veto_amendments] stanza).
# An amendment must not appear in both lists.
# [amendments]
# upvote = ["fixReducedOffersV2"]
# veto   = ["DeepFreeze"]
